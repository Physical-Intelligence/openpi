# lipbalm.yaml: Experiment config for single right-arm pi0.5 fine-tuning on lipbalm task.
# Used by train.sh and eval.sh to configure remote training/eval jobs.

experiment:
  name: lipbalm_pi05
  project_name: openpi-lipbalm

data:
  raw_dir: experiments/data/raw
  processed_dir: experiments/data/processed
  datasets:
    - mobileai-lipbalm
    - mobileai-lipbalm1
    - mobileai-lipbalm2
  # Name of the merged processed dataset (output of process_single_arm.py --merge)
  merged_name: mobileai-lipbalm-all-right

model:
  base_checkpoint: gs://openpi-assets/checkpoints/pi05_base/params
  assets_dir: gs://openpi-assets/checkpoints/pi05_base/assets
  asset_id: trossen
  # Set this to a local pytorch checkpoint path if available
  pytorch_weight_path: null

training:
  num_train_steps: 20000
  batch_size: 64
  peak_lr: 5.0e-5
  warmup_steps: 1000
  save_interval: 2000
  resume: false
  wandb_enabled: true
  checkpoint_base_dir: ./checkpoints

eval:
  checkpoint_step: null  # null = latest
  port: 8000

# Remote server config — set server.name to an entry from ~/.ssh/config
server:
  name: aws-L40S-48gb
  remote_dir: ~/openpi
  remote_data_dir: ~/data/lipbalm
  gpu_count: 1
