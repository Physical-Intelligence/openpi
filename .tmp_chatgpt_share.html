m, pathlib\\nbase_dir = \\\"/mnt/data/topk_mvp_code\\\"\\nif os.path.exists(base_dir):\\n    shutil.rmtree(base_dir)\\nos.makedirs(base_dir, exist_ok=True)\\nos.makedirs(os.path.join(base_dir, \\\"tests\\\"), exist_ok=True)\\n\\ncandidate_generator_py = r\\\"\\\"\\\"\\n# candidate_generator.py\\n# MVP candidate generator (RGB-only) using contours on a ROI.\\n# Works without ML dependencies; suitable for early pipeline verification.\\n\\nfrom __future__ import annotations\\nfrom dataclasses import dataclass\\nfrom typing import List, Optional, Tuple\\nimport cv2\\nimport numpy as np\\n\\n\\n@dataclass\\nclass Candidate:\\n    candidate_id: int\\n    bbox_xyxy: Tuple[int, int, int, int]  # x1,y1,x2,y2 in original image coords\\n    score_graspability: float             # heuristic [0,1]\\n    crop_rgb: np.ndarray                  # BGR uint8 crop (OpenCV)\\n\\n\\ndef _clip_bbox(x1: int, y1: int, x2: int, y2: int, w: int, h: int) -\u003e Tuple[int,int,int,int]:\\n    x1 = max(0, min(x1, w-1))\\n    y1 = max(0, min(y1, h-1))\\n    x2 = max(0, min(x2, w-1))\\n    y2 = max(0, min(y2, h-1))\\n    if x2 \u003c= x1: x2 = min(w-1, x1 + 1)\\n    if y2 \u003c= y1: y2 = min(h-1, y1 + 1)\\n    return x1,y1,x2,y2\\n\\n\\ndef generate_candidates_rgb(\\n    bgr: np.ndarray,\\n    roi_xyxy: Optional[Tuple[int,int,int,int]] = None,\\n    max_candidates: int = 5,\\n    min_area: int = 800,\\n) -\u003e List[Candidate]:\\n    \\\"\\\"\\\"\\n    Generate object candidates from a single RGB frame (BGR OpenCV image).\\n    Strategy:\\n      - Optionally crop ROI (box opening region).\\n      - Edge -\u003e morph close -\u003e contours -\u003e bounding boxes.\\n      - Rank by contour area; keep top N.\\n    \\\"\\\"\\\"\\n    if bgr is None or bgr.size == 0:\\n        raise ValueError(\\\"Empty image\\\")\\n\\n    H, W = bgr.shape[:2]\\n    if roi_xyxy is None:\\n        x1,y1,x2,y2 = 0,0,W-1,H-1\\n    else:\\n        x1,y1,x2,y2 = roi_xyxy\\n        x1,y1,x2,y2 = _clip_bbox(x1,y1,x2,y2,W,H)\\n\\n    roi = bgr[y1:y2, x1:x2].copy()\\n\\n    gray = cv2.cvtColor(roi, cv2.COLOR_BGR2GRAY)\\n    gray = cv2.GaussianBlur(gray, (5,5), 0)\\n\\n    # Edges then close gaps\\n    edges = cv2.Canny(gray, 40, 120)\\n    kernel = cv2.getStructuringElement(cv2.MORPH_RECT, (7,7))\\n    closed = cv2.morphologyEx(edges, cv2.MORPH_CLOSE, kernel, iterations=2)\\n\\n    contours, _ = cv2.findContours(closed, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)\\n\\n    boxes = []\\n    for c in contours:\\n        area = cv2.contourArea(c)\\n        if area \u003c min_area:\\n            continue\\n        rx, ry, rw, rh = cv2.boundingRect(c)\\n        # convert to image coords\\n        bx1, by1 = x1 + rx, y1 + ry\\n        bx2, by2 = x1 + rx + rw, y1 + ry + rh\\n        boxes.append((area, bx1, by1, bx2, by2))\\n\\n    boxes.sort(reverse=True, key=lambda t: t[0])\\n    boxes = boxes[:max_candidates]\\n\\n    candidates: List[Candidate] = []\\n    for idx, (area, bx1, by1, bx2, by2) in enumerate(boxes):\\n        bx1,by1,bx2,by2 = _clip_bbox(int(bx1),int(by1),int(bx2),int(by2),W,H)\\n        crop = bgr[by1:by2, bx1:bx2].copy()\\n        # Heuristic graspability: prefer medium boxes, not too thin\\n        bw, bh = max(1, bx2-bx1), max(1, by2-by1)\\n        aspect = bw / bh\\n        aspect_penalty = np.exp(-abs(np.log(aspect)))  # near 1 is best\\n        size_penalty = np.exp(-abs(np.log((bw*bh) / (0.08*W*H + 1e-9))))\\n        grasp = float(np.clip(0.6*aspect_penalty + 0.4*size_penalty, 0.0, 1.0))\\n        candidates.append(Candidate(candidate_id=idx, bbox_xyxy=(bx1,by1,bx2,by2), score_graspability=grasp, crop_rgb=crop))\\n\\n    return candidates\\n\\\"\\\"\\\"\\n\\nranker_orb_py = r\\\"\\\"\\\"\\n# ranker_orb.py\\n# MVP image-retrieval ranker using ORB features (no pretrained weights needed).\\n\\nfrom __future__ import annotations\\nfrom dataclasses import dataclass\\nfrom typing import List, Tuple\\nimport cv2\\nimport numpy as np\\n\\n\\n@dataclass\\nclass RankedCandidate:\\n    candidate_id: int\\n    bbox_xyxy: Tuple[int,int,int,int]\\n    score: float\\n    score_retrieval: float\\n    score_graspability: float\\n\\n\\nclass ORBRanker:\\n    def __init__(self, nfeatures: int = 1200):\\n        self.orb = cv2.ORB_create(nfeatures=nfeatures)\\n        self.bf = cv2.BFMatcher(cv2.NORM_HAMMING, crossCheck=False)\\n\\n    def _embed(self, bgr: np.ndarray):\\n        gray = cv2.cvtColor(bgr, cv2.COLOR_BGR2GRAY)\\n        kp, des = self.orb.detectAndCompute(gray, None)\\n        return kp, des\\n\\n    def _match_score(self, des_a, des_b) -\u003e float:\\n        if des_a is None or des_b is None:\\n            return 0.0\\n        matches = self.bf.knnMatch(des_a, des_b, k=2)\\n        good = 0\\n        for m_n in matches:\\n            if len(m_n) \u003c 2:\\n                continue\\n            m, n = m_n\\n            if m.distance \u003c 0.75 * n.distance:\\n                good += 1\\n        # Normalize roughly by descriptor count\\n        denom = max(1, min(len(des_a), len(des_b)))\\n        return float(good / denom)\\n\\n    def rank(self, candidates, sku_images_bgr: List[np.ndarray], w_grasp: float = 0.1) -\u003e List[RankedCandidate]:\\n        # Build SKU prototype: take best match over provided SKU images\\n        sku_descs = [self._embed(img)[1] for img in sku_images_bgr if img is not None and img.size \u003e 0]\\n        if not sku_descs:\\n            raise ValueError(\\\"No valid sku_images_bgr provided\\\")\\n\\n        ranked: List[RankedCandidate] = []\\n        for c in candidates:\\n            _, des_c = self._embed(c.crop_rgb)\\n            retrieval = 0.0\\n            for des_sku in sku_descs:\\n                retrieval = max(retrieval, self._match_score(des_c, des_sku))\\n            score = float(retrieval + w_grasp * c.score_graspability)\\n            ranked.append(RankedCandidate(\\n                candidate_id=c.candidate_id,\\n                bbox_xyxy=c.bbox_xyxy,\\n                score=score,\\n                score_retrieval=retrieval,\\n                score_graspability=c.score_graspability\\n            ))\\n\\n        ranked.sort(key=lambda r: r.score, reverse=True)\\n        return ranked\\n\\\"\\\"\\\"\\n\\nfsm_demo_py = r\\\"\\\"\\\"\\n# fsm_demo.py\\n# Demonstrates the Top-K MVP loop (without real robot/openpi).\\n# It generates candidates -\u003e ranks -\u003e simulates pick_to_scan and barcode check.\\n\\nfrom __future__ import annotations\\nfrom dataclasses import dataclass\\nfrom typing import Dict, List, Optional, Tuple\\nimport time\\nimport cv2\\nimport numpy as np\\n\\nfrom candidate_generator import generate_candidates_rgb\\nfrom ranker_orb import ORBRanker\\n\\n\\n@dataclass\\nclass Task:\\n    order_id: str\\n    cell_id: str\\n    target_barcode: str\\n    sku_images: List[np.ndarray]  # BGR images\\n\\n\\nclass MockBarcodeReader:\\n    \\\"\\\"\\\"\\n    Simulates industrial barcode reader results.\\n    In real system, replace with USB scanner reader.\\n    \\\"\\\"\\\"\\n    def __init__(self, truth_map: Dict[int, str]):\\n        self.truth_map = truth_map\\n\\n    def scan(self, candidate_id: int) -\u003e Optional[str]:\\n        # In real use, this would block until scan or timeout.\\n        return self.truth_map.get(candidate_id, None)\\n\\n\\ndef run_topk_loop(\\n    frame_bgr: np.ndarray,\\n    task: Task,\\n    truth_map: Dict[int, str],\\n    roi_xyxy: Optional[Tuple[int,int,int,int]] = None,\\n    K: int = 3,\\n):\\n    t0 = time.time()\\n    candidates = generate_candidates_rgb(frame_bgr, roi_xyxy=roi_xyxy, max_candidates=5)\\n    print(f\\\"[MVP] generated {len(candidates)} candidates\\\")\\n\\n    ranker = ORBRanker()\\n    ranked = ranker.rank(candidates, task.sku_images, w_grasp=0.1)\\n    ranked = ranked[:min(K, len(ranked))]\\n    print(\\\"[MVP] Top-K ranked candidates:\\\")\\n    for r in ranked:\\n        print(\\\"  \\\", r)\\n\\n    barcode = MockBarcodeReader(truth_map)\\n    attempts = 0\\n    for r in ranked:\\n        attempts += 1\\n        # pick_to_scan would be invoked here (openpi); we simulate by directly scanning.\\n        code = barcode.scan(r.candidate_id)\\n        if code is None:\\n            print(f\\\"[MVP] scan fail for candidate {r.candidate_id} -\u003e treat as mismatch -\u003e BUFFER\\\")\\n            continue\\n        if code == task.target_barcode:\\n            print(f\\\"[MVP] HIT on attempt {attempts}: barcode={code}\\\")\\n            print(f\\\"[MVP] place_to_bin(OUTBOUND)\\\")\\n            return {\\\"success\\\": True, \\\"attempts\\\": attempts, \\\"time_s\\\": time.time()-t0, \\\"hit_candidate\\\": r.candidate_id}\\n        else:\\n            print(f\\\"[MVP] MISS on attempt {attempts}: barcode={code} -\u003e place_to_bin(BUFFER)\\\")\\n            continue\\n\\n    print(\\\"[MVP] Not found in Top-K; would re-observe and repeat in real system.\\\")\\n    return {\\\"success\\\": False, \\\"attempts\\\": attempts, \\\"time_s\\\": time.time()-t0, \\\"hit_candidate\\\": None}\\n\\n\\nif __name__ == \\\"__main__\\\":\\n    import argparse, os\\n\\n    ap = argparse.ArgumentParser()\\n    ap.add_argument(\\\"--image\\\", required=True, help=\\\"Path to a BGR image (jpg/png) to test.\\\")\\n    ap.add_argument(\\\"--roi\\\", default=\\\"\\\", help=\\\"Optional ROI x1,y1,x2,y2\\\")\\n    args = ap.parse_args()\\n\\n    img = cv2.imread(args.image)\\n    if img is None:\\n        raise FileNotFoundError(args.image)\\n\\n    # For demo: choose one candidate crop as the 'SKU image', then set target_barcode to match it.\\n    candidates = generate_candidates_rgb(img, roi_xyxy=None, max_candidates=5)\\n    if not candidates:\\n        raise RuntimeError(\\\"No candidates found; try a different image or adjust thresholds.\\\")\\n\\n    target_candidate = candidates[0]\\n    sku_images = [target_candidate.crop_rgb]  # pretend WMS provided this\\n\\n    task = Task(order_id=\\\"demo\\\", cell_id=\\\"cellA\\\", target_barcode=\\\"TARGET123\\\", sku_images=sku_images)\\n    truth_map = {c.candidate_id: (\\\"TARGET123\\\" if c.candidate_id == target_candidate.candidate_id else f\\\"X{c.candidate_id}\\\") for c in candidates}\\n\\n    roi = None\\n    if args.roi:\\n        parts = [int(x) for x in args.roi.split(\\\",\\\")]\\n        roi = (parts[0], parts[1], parts[2], parts[3])\\n\\n    res = run_topk_loop(img, task, truth_map, roi_xyxy=roi, K=3)\\n    print(\\\"[MVP] result:\\\", res)\\n\\\"\\\"\\\"\\n\\ntest_py = r\\\"\\\"\\\"\\n# tests/test_pipeline.py\\nimport os\\nimport cv2\\nimport numpy as np\\n\\nfrom candidate_generator import generate_candidates_rgb\\nfrom ranker_orb import ORBRanker\\n\\n\\ndef _load_any_test_image():\\n    # Prefer images extracted from the user's assets if present\\n    candidates = [\\n        \\\"/mnt/data/out_doc_images/warehouse.png\\\",\\n        \\\"/mnt/data/out_video_frames/frame_0180.jpg\\\",\\n        \\\"/mnt/data/out_video_frames/frame_0360.jpg\\\",\\n    ]\\n    for p in candidates:\\n        if os.path.exists(p):\\n            img = cv2.imread(p)\\n            if img is not None:\\n                return img, p\\n    # Fallback: generate synthetic image with rectangles\\n    img = np.zeros((480, 640, 3), dtype=np.uint8)\\n    cv2.rectangle(img, (80,120), (200,260), (255,255,255), -1)\\n    cv2.rectangle(img, (260,140), (360,300), (200,200,200), -1)\\n    cv2.rectangle(img, (420,160), (560,340), (150,150,150), -1)\\n    return img, \\\"synthetic\\\"\\n\\n\\ndef test_topk_self_match():\\n    img, src = _load_any_test_image()\\n    cands = generate_candidates_rgb(img, max_candidates=5, min_area=600)\\n    assert len(cands) \u003e= 1, f\\\"No candidates found on {src}\\\"\\n    # Choose one candidate crop as the SKU image; it should rank itself highest most of the time.\\n    sku_images = [cands[0].crop_rgb]\\n    ranker = ORBRanker(nfeatures=1500)\\n    ranked = ranker.rank(cands, sku_images, w_grasp=0.0)\\n    assert ranked[0].candidate_id == cands[0].candidate_id, f\ e487e-651e-4e08-a1a0-89755ee379a5\",{\"_159\":160,\"_201\":4440,\"_203\":4441,\"_205\":206,\"_207\":208,\"_209\":210,\"_128\":4340,\"_211\":212,\"_213\":214,\"_215\":214,\"_216\":217,\"_218\":4394,\"_131\":4341,\"_67\":24},[],[],[4443],\"0063278c-0fe2-4b3d-a1ef-d29008febc55\",{\"_40\":4443,\"_45\":4445,\"_70\":4426,\"_41\":4451},{\"_40\":4443,\"_47\":4446,\"_32\":4448,\"_53\":4449,\"_60\":61,\"_62\":14,\"_63\":90,\"_51\":4450,\"_68\":69},{\"_49\":138,\"_51\":4447},{},1767938669.472808,{\"_55\":1105,\"_53\":4303},{\"_159\":1108,\"_1109\":1142,\"_128\":4340,\"_211\":212,\"_213\":214,\"_215\":214,\"_216\":217,\"_218\":4426,\"_131\":4341,\"_67\":24},[4452],\"a6fe7c99-139e-4606-a8cc-4a582776bf6c\",{\"_40\":4452,\"_45\":4454,\"_70\":4443,\"_41\":4466},{\"_40\":4452,\"_47\":4455,\"_32\":4457,\"_53\":4458,\"_60\":61,\"_62\":14,\"_63\":90,\"_51\":4460,\"_68\":243,\"_1173\":4392},{\"_49\":138,\"_51\":4456},{},1767938660.64309,{\"_55\":227,\"_228\":229,\"_56\":4459},\"import os, shutil, zipfile, cv2, numpy as np\\n\\nbase_dir = \\\"/mnt/data/topk_mvp_code\\\"\\nzip_path = \\\"/mnt/data/topk_mvp_code.zip\\\"\\nfor p in [base_dir, zip_path]:\\n    if os.path.isdir(p):\\n        shutil.rmtree(p)\\n    elif os.path.exists(p):\\n        os.remove(p)\\n\\nos.makedirs(base_dir, exist_ok=True)\\nos.makedirs(os.path.join(base_dir, \\\"tests\\\"), exist_ok=True)\\nos.makedirs(os.path.join(base_dir, \\\"assets\\\"), exist_ok=True)\\n\\ncandidate_generator_py = '''\\\\\\n# candidate_generator.py\\n# MVP candidate generator (RGB-only) using contours on a ROI.\\n# Works without ML dependencies; suitable for early pipeline verification.\\n\\nfrom __future__ import annotations\\nfrom dataclasses import dataclass\\nfrom typing import List, Optional, Tuple\\nimport cv2\\nimport numpy as np\\n\\n\\n@dataclass\\nclass Candidate:\\n    candidate_id: int\\n    bbox_xyxy: Tuple[int, int, int, int]  # x1,y1,x2,y2 in original image coords\\n    score_graspability: float             # heuristic [0,1]\\n    crop_rgb: np.ndarray                  # BGR uint8 crop (OpenCV)\\n\\n\\ndef _clip_bbox(x1: int, y1: int, x2: int, y2: int, w: int, h: int) -\u003e Tuple[int,int,int,int]:\\n    x1 = max(0, min(x1, w-1))\\n    y1 = max(0, min(y1, h-1))\\n    x2 = max(0, min(x2, w-1))\\n    y2 = max(0, min(y2, h-1))\\n    if x2 \u003c= x1:\\n        x2 = min(w-1, x1 + 1)\\n    if y2 \u003c= y1:\\n        y2 = min(h-1, y1 + 1)\\n    return x1, y1, x2, y2\\n\\n\\ndef generate_candidates_rgb(\\n    bgr: np.ndarray,\\n    roi_xyxy: Optional[Tuple[int,int,int,int]] = None,\\n    max_candidates: int = 5,\\n    min_area: int = 800,\\n) -\u003e List[Candidate]:\\n    '''\\n    Generate object candidates from a single RGB frame (BGR OpenCV image).\\n\\n    Strategy:\\n      - Optionally crop ROI (box opening region).\\n      - Edge -\u003e morph close -\u003e contours -\u003e bounding boxes.\\n      - Rank by contour area; keep top N.\\n    '''\\n    if bgr is None or bgr.size == 0:\\n        raise ValueError(\\\"Empty image\\\")\\n\\n    H, W = bgr.shape[:2]\\n    if roi_xyxy is None:\\n        x1, y1, x2, y2 = 0, 0, W-1, H-1\\n    else:\\n        x1, y1, x2, y2 = roi_xyxy\\n        x1, y1, x2, y2 = _clip_bbox(x1, y1, x2, y2, W, H)\\n\\n    roi = bgr[y1:y2, x1:x2].copy()\\n\\n    gray = cv2.cvtColor(roi, cv2.COLOR_BGR2GRAY)\\n    gray = cv2.GaussianBlur(gray, (5,5), 0)\\n\\n    edges = cv2.Canny(gray, 40, 120)\\n    kernel = cv2.getStructuringElement(cv2.MORPH_RECT, (7,7))\\n    closed = cv2.morphologyEx(edges, cv2.MORPH_CLOSE, kernel, iterations=2)\\n\\n    contours, _ = cv2.findContours(closed, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)\\n\\n    boxes = []\\n    for c in contours:\\n        area = cv2.contourArea(c)\\n        if area \u003c min_area:\\n            continue\\n        rx, ry, rw, rh = cv2.boundingRect(c)\\n        bx1, by1 = x1 + rx, y1 + ry\\n        bx2, by2 = x1 + rx + rw, y1 + ry + rh\\n        boxes.append((area, bx1, by1, bx2, by2))\\n\\n    boxes.sort(reverse=True, key=lambda t: t[0])\\n    boxes = boxes[:max_candidates]\\n\\n    candidates: List[Candidate] = []\\n    for idx, (area, bx1, by1, bx2, by2) in enumerate(boxes):\\n        bx1, by1, bx2, by2 = _clip_bbox(int(bx1), int(by1), int(bx2), int(by2), W, H)\\n        crop = bgr[by1:by2, bx1:bx2].copy()\\n        bw, bh = max(1, bx2-bx1), max(1, by2-by1)\\n        aspect = bw / bh\\n        aspect_penalty = float(np.exp(-abs(np.log(aspect))))  # near 1 is best\\n        size_penalty = float(np.exp(-abs(np.log((bw*bh) / (0.08*W*H + 1e-9)))))\\n        grasp = float(np.clip(0.6*aspect_penalty + 0.4*size_penalty, 0.0, 1.0))\\n        candidates.append(Candidate(\\n            candidate_id=idx,\\n            bbox_xyxy=(bx1, by1, bx2, by2),\\n            score_graspability=grasp,\\n            crop_rgb=crop\\n        ))\\n\\n    return candidates\\n'''\\n\\nranker_orb_py = '''\\\\\\n# ranker_orb.py\\n# MVP image-retrieval ranker using ORB features (no pretrained weights needed).\\n\\nfrom __future__ import annotations\\nfrom dataclasses import dataclass\\nfrom typing import List, Tuple\\nimport cv2\\nimport numpy as np\\n\\n\\n@dataclass\\nclass RankedCandidate:\\n    candidate_id: int\\n    bbox_xyxy: Tuple[int,int,int,int]\\n    score: float\\n    score_retrieval: float\\n    score_graspability: float\\n\\n\\nclass ORBRanker:\\n    def __init__(self, nfeatures: int = 1200):\\n        self.orb = cv2.ORB_create(nfeatures=nfeatures)\\n        self.bf = cv2.BFMatcher(cv2.NORM_HAMMING, crossCheck=False)\\n\\n    def _embed(self, bgr: np.ndarray):\\n        gray = cv2.cvtColor(bgr, cv2.COLOR_BGR2GRAY)\\n        kp, des = self.orb.detectAndCompute(gray, None)\\n        return kp, des\\n\\n    def _match_score(self, des_a, des_b) -\u003e float:\\n        if des_a is None or des_b is None:\\n            return 0.0\\n        matches = self.bf.knnMatch(des_a, des_b, k=2)\\n        good = 0\\n        for m_n in matches:\\n            if len(m_n) \u003c 2:\\n                continue\\n            m, n = m_n\\n            if m.distance \u003c 0.75 * n.distance:\\n                good += 1\\n        denom = max(1, min(len(des_a), len(des_b)))\\n        return float(good / denom)\\n\\n    def rank(self, candidates, sku_images_bgr: List[np.ndarray], w_grasp: float = 0.1) -\u003e List[RankedCandidate]:\\n        sku_descs = [self._embed(img)[1] for img in sku_images_bgr if img is not None and img.size \u003e 0]\\n        if not sku_descs:\\n            raise ValueError(\\\"No valid sku_images_bgr provided\\\")\\n\\n        ranked: List[RankedCandidate] = []\\n        for c in candidates:\\n            _, des_c = self._embed(c.crop_rgb)\\n            retrieval = 0.0\\n            for des_sku in sku_descs:\\n                retrieval = max(retrieval, self._match_score(des_c, des_sku))\\n            score = float(retrieval + w_grasp * c.score_graspability)\\n            ranked.append(RankedCandidate(\\n                candidate_id=c.candidate_id,\\n                bbox_xyxy=c.bbox_xyxy,\\n                score=score,\\n                score_retrieval=retrieval,\\n                score_graspability=c.score_graspability\\n            ))\\n\\n        ranked.sort(key=lambda r: r.score, reverse=True)\\n        return ranked\\n'''\\n\\nfsm_demo_py = '''\\\\\\n# fsm_demo.py\\n# Demonstrates the Top-K MVP loop (without real robot/openpi).\\n# It generates candidates -\u003e ranks -\u003e simulates pick_to_scan and barcode check.\\n\\nfrom __future__ import annotations\\nfrom dataclasses import dataclass\\nfrom typing import Dict, List, Optional, Tuple\\nimport time\\nimport cv2\\nimport numpy as np\\n\\nfrom candidate_generator import generate_candidates_rgb\\nfrom ranker_orb import ORBRanker\\n\\n\\n@dataclass\\nclass Task:\\n    order_id: str\\n    cell_id: str\\n    target_barcode: str\\n    sku_images: List[np.ndarray]  # BGR images\\n\\n\\nclass MockBarcodeReader:\\n    def __init__(self, truth_map: Dict[int, str]):\\n        self.truth_map = truth_map\\n\\n    def scan(self, candidate_id: int) -\u003e Optional[str]:\\n        return self.truth_map.get(candidate_id, None)\\n\\n\\ndef run_topk_loop(\\n    frame_bgr: np.ndarray,\\n    task: Task,\\n    truth_map: Dict[int, str],\\n    roi_xyxy: Optional[Tuple[int,int,int,int]] = None,\\n    K: int = 3,\\n):\\n    t0 = time.time()\\n    candidates = generate_candidates_rgb(frame_bgr, roi_xyxy=roi_xyxy, max_candidates=5)\\n    print(f\\\"[MVP] generated {len(candidates)} candidates\\\")\\n\\n    ranker = ORBRanker()\\n    ranked = ranker.rank(candidates, task.sku_images, w_grasp=0.1)\\n    ranked = ranked[:min(K, len(ranked))]\\n    print(\\\"[MVP] Top-K ranked candidates:\\\")\\n    for r in ranked:\\n        print(\\\"  \\\", r)\\n\\n    barcode = MockBarcodeReader(truth_map)\\n    attempts = 0\\n    for r in ranked:\\n        attempts += 1\\n        code = barcode.scan(r.candidate_id)\\n        if code is None:\\n            print(f\\\"[MVP] scan fail for candidate {r.candidate_id} -\u003e treat as mismatch -\u003e BUFFER\\\")\\n            continue\\n        if code == task.target_barcode:\\n            print(f\\\"[MVP] HIT on attempt {attempts}: barcode={code}\\\")\\n            print(\\\"[MVP] place_to_bin(OUTBOUND)\\\")\\n            return {\\\"success\\\": True, \\\"attempts\\\": attempts, \\\"time_s\\\": time.time()-t0, \\\"hit_candidate\\\": r.candidate_id}\\n        else:\\n            print(f\\\"[MVP] MISS on attempt {attempts}: barcode={code} -\u003e place_to_bin(BUFFER)\\\")\\n            continue\\n\\n    print(\\\"[MVP] Not found in Top-K; would re-observe and repeat in real system.\\\")\\n    return {\\\"success\\\": False, \\\"attempts\\\": attempts, \\\"time_s\\\": time.time()-t0, \\\"hit_candidate\\\": None}\\n\\n\\nif __name__ == \\\"__main__\\\":\\n    import argparse, os\\n\\n    ap = argparse.ArgumentParser()\\n    ap.add_argument(\\\"--image\\\", required=True, help=\\\"Path to a BGR image (jpg/png) to test.\\\")\\n    ap.add_argument(\\\"--roi\\\", default=\\\"\\\", help=\\\"Optional ROI x1,y1,x2,y2\\\")\\n    args = ap.parse_args()\\n\\n    img = cv2.imread(args.image)\\n    if img is None:\\n        raise FileNotFoundError(args.image)\\n\\n    candidates = generate_candidates_rgb(img, roi_xyxy=None, max_candidates=5, min_area=600)\\n    if not candidates:\\n        raise RuntimeError(\\\"No candidates found; try a different image or adjust thresholds.\\\")\\n\\n    target_candidate = candidates[0]\\n    sku_images = [target_candidate.crop_rgb]  # pretend WMS provided this\\n    task = Task(order_id=\\\"demo\\\", cell_id=\\\"cellA\\\", target_barcode=\\\"TARGET123\\\", sku_images=sku_images)\\n    truth_map = {c.candidate_id: (\\\"TARGET123\\\" if c.candidate_id == target_candidate.candidate_id else f\\\"X{c.candidate_id}\\\") for c in candidates}\\n\\n    roi = None\\n    if args.roi:\\n        parts = [int(x) for x in args.roi.split(\\\",\\\")]\\n        roi = (parts[0], parts[1], parts[2], parts[3])\\n\\n    res = run_topk_loop(img, task, truth_map, roi_xyxy=roi, K=3)\\n    print(\\\"[MVP] result:\\\", res)\\n'''\\n\\ntest_py = '''\\\\\\n# tests/test_pipeline.py\\nimport os\\nimport cv2\\nimport numpy as np\\n\\nfrom candidate_generator import generate_candidates_rgb\\nfrom ranker_orb import ORBRanker\\n\\n\\ndef _load_any_test_image():\\n    candidates = [\\n        os.path.join(os.path.dirname(__file__), \\\"..\\\", \\\"assets\\\", \\\"warehouse.png\\\"),\\n    ]\\n    # add a few frames if present\\n    for fn in [\\\"frame_0000.jpg\\\", \\\"frame_0180.jpg\\\", \\\"frame_0360.jpg\\\"]:\\n        candidates.append(os.path.join(os.path.dirname(__file__), \\\"..\\\", \\\"assets\\\", fn))\\n\\n    for p in candidates:\\n        p = os.path.abspath(p)\\n        if os.path.exists(p):\\n            img = cv2.imread(p)\\n            if img is not None:\\n                return img, p\\n\\n    img = np.zeros((480, 640, 3), dtype=np.uint8)\\n    cv2.rectangle(img, (80,120), (200,260), (255,255,255), -1)\\n    c 要下载任何预训练权重**，离线即可跑（适合先把工程链路打通）\\n\\n\u003e 后续上线版建议换成 CLIP/SigLIP/DINOv2 embedding + 向量库（更稳），但那需要你部署对应模型权重。\\n\\n### 3) Top-K 闭环示例（FSM Demo）\\n- `fsm_demo.py`\\n- 演示：候选 → Top-K → 模拟 `pick_to_scan`（此处用 mock）→ 模拟扫码 → 命中放 OUTBOUND / 不命中放 BUFFER\\n\\n---\\n\\n## 我已经做了哪些测试\\n在环境里我用 assets 里的图跑了：\\n- ✅ 生成候选成功（示例图上生成了 3 个候选）\\n- ✅ “自匹配测试”：拿候选 0 的 crop 当作 SKU 图片，Top-1 排名能命中\\n- ✅ 单测通过（字段合法、Top-1 自匹配）\\n\\n---\\n\\n## 你本地怎么跑（拿到 zip 后）\\n解压后在目录里：\\n- 运行 demo：\\n```bash\\npython fsm_demo.py --image assets/warehouse.png\\n```\\n或换成 `assets/` 里的某个 frame jpg。\\n\\n- 你也可以直接把 `candidate_generator` 替换成你真实的 RGBD 分割，然后把 `ORBRanker` 替换成 CLIP embedding 排序，FSM 不用改。\\n\\n---\\n\\n## 重要提醒（MVP 代码的局限）\\n- 候选生成现在是 RGB 的轮廓法，**会把大背景/边界当成候选**（你看到 candidate 0 bbox 可能很大），这很正常：MVP先验证链路。\\n- ORB 检索对反光/角度变化会敏感：**用于 MVP 验证够用**，上线版建议换 embedding 检索。\\n\\n---\\n\\n## 下一步我建议你选一个方向，我就继续把代码升级到“可接真机”\\n你现在想优先把哪块做成更接近真实的版本？\\n\\nA) **候选生成升级（RGBD）**：用 RealSense 深度做前景分割 + 连通域，稳定产出 5 件候选（更接近你箱格场景）  \\nB) **检索升级（CLIP/DINOv2）**：用 embedding 排序（更接近“SKU图片检索”）  \\nC) **接 openpi 接口**：把 `pick_to_scan`/`place_to_bin` 的 wrapper 和 websocket client 框架补齐（先 stub，后接真 policy）\\n\\n你回 A/B/C 我就把对应模块的代码直接补上，并继续在这里跑测试验证。\",{\"_232\":4690,\"_238\":12,\"_203\":4692,\"_1626\":4698,\"_201\":4699,\"_205\":206,\"_128\":4340,\"_211\":212,\"_213\":214,\"_215\":214,\"_216\":217,\"_218\":4652,\"_131\":4341,\"_67\":24},{\"_27\":234,\"_235\":4691},[1124],[4693],{\"_1156\":1741,\"_1158\":4694,\"_1159\":4694,\"_1626\":4695,\"_1630\":4696,\"_1160\":59,\"_1633\":-5,\"_27\":1744,\"_1745\":4697,\"_1749\":14},1681,[],[],[],[],[],[],\"moderation_results\",[],\"current_node\",\"conversation_id\",\"is_archived\",[4707,1666,2712,3818,4708,2696,1761,1695,1944,3819,3796,3852,1957,1907,1902,3798,2676,3517,1628,3799,3851,2695,2675,1829,3835,3797,1952,3500,1629,2475,1767,1665,3834],\"https://www.openai.com\",\"https://github.com/tonyzhaozh/aloha/tree/main相同。G：PI05的内容从https://github.com/Physical-Intelligence/openpi\",\"blocked_urls\",[],\"disabled_tool_ids\",[]
